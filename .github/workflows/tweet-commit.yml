name: Auto Tweet Commit
on:
  push:
    branches: [main]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and schedule tweet
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUFFER_KEY: ${{ secrets.BUFFER_API_KEY }}
          CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: |
          COMMIT_MSG=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH")
          [ -z "$COMMIT_MSG" ] && exit 0

          # Try Gemini AI with retry, fallback to formatted commit
          TWEET=""
          for i in 1 2 3; do
            RESP=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg msg "$COMMIT_MSG" '{contents:[{parts:[{text: ("voce e um dev solo building in public. NÃO robo de marketing. Reescreva o commit como 1 tweet PT-BR, max 200 chars. REGRAS: nao pare IA (sem estamos felizes, animado em anunciar, emoji excesso, hashtags, markdown). pare dev real: eu/tao/fiz/soltei/quebrei/arrumei — tom cru. conte o que rolou + por que importa. NUNCA comece com Acabei de. injete contexto se commit for boring. FORMATAÇÃO: [o que fiz] + [por que/o que tava quebrado/proximo]. EXEMPLOS: BOA: arrumei o layout do card no mobile. tava horroroso em tela pequena, agora quebra em 3 colunas. BOA: subi o gerador de OG image. 1200x630, titulo + desc, roda no browser. nao abro mais o canva. RUIM: Estamos muito felizes em anunciar o lançamento! RUIM: Acabei de fazer um commit incrivel! #dev. Commit: " + $msg)}]}]}')")
            TWEET=$(echo "$RESP" | jq -r '.candidates[0].content.parts[0].text // empty')
            [ -n "$TWEET" ] && break
            [ $i -lt 3 ] && sleep 15 || true
          done

          if [ -z "$TWEET" ]; then
            TWEET="${COMMIT_MSG} - cajuos.dev"
          fi

          curl -s -X POST "https://api.buffer.com" \
            -H "Authorization: Bearer ${BUFFER_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$TWEET" --arg channel "$CHANNEL_ID" \
              '{query: "mutation($input: CreatePostInput!) { createPost(input: $input) { ... on PostActionSuccess { post { id } } ... on UnexpectedError { message } } }",
                variables: {input: {text: $text, channelId: $channel, mode: "shareNow", schedulingType: "automatic", assets: []}}}')"
